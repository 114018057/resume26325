<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人履歷</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      border-bottom: 2px solid #ddd;
      padding-bottom: 20px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 20px;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
    }

    .section {
      margin-top: 25px;
    }

    .section h2 {
      border-left: 5px solid #4CAF50;
      padding-left: 10px;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .info {
      line-height: 1.8;
    }

    .skills span {
      display: inline-block;
      background: #4CAF50;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      margin: 5px 5px 0 0;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <!-- 照片 -->
    <img src="images/photo.jpg" alt="個人照片" class="profile-img">

    <div>
      <div class="name">林品禎</div>
      <div>亞洲大學學生</div>
      <div>Email: example@email.com</div>
    </div>
  </div>

  <div class="section">
    <h2>自我介紹</h2>
    <div class="info" id="intro">
      我是一位對醫療與復健領域充滿熱情的學生，未來希望成為語言治療師，幫助需要的人恢復溝通能力。
    </div>
  </div>

  <div class="section">
    <h2>學歷</h2>
    <div class="info">
      亞洲大學（在學中）<br>
      主修：相關醫療領域
    </div>
  </div>

  <div class="section">
    <h2>技能</h2>
    <div class="skills">
      <span>溝通能力</span>
      <span>團隊合作</span>
      <span>基礎醫療知識</span>
      <span>問題解決</span>
    </div>
  </div>

  <div class="section">
    <h2>經驗</h2>
    <div class="info">
      曾參與校內活動與團隊合作專案，培養溝通與組織能力。
    </div>
  </div>

  <button onclick="changeIntro()">換一段自我介紹</button>
</div>

<script>
  function changeIntro() {
    const intro = document.getElementById("intro");
    intro.innerText = "我對復健與語言治療領域有高度興趣，希望未來能透過專業幫助更多人提升生活品質。";
  }
</script>

</body>
</html>
