<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人履歷</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    /* 仿截圖雙欄式容器 */
    .container {
      width: 800px;
      background: white;
      display: flex;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    /* 左側深色欄位 */
    .sidebar {
      width: 35%;
      background-color: #424242;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid #616161;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .name-box {
      border: 2px solid white;
      padding: 10px;
      margin-bottom: 10px;
    }

    .name {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .sidebar-section {
      text-align: left;
      margin-top: 40px;
    }

    .sidebar-section h2 {
      font-size: 16px;
      border: 1px solid white;
      display: inline-block;
      padding: 2px 15px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .sidebar-info {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* 右側白色內容區 */
    .main-content {
      width: 65%;
      padding: 40px;
      color: #333;
    }

    .section {
      margin-bottom: 35px;
    }

    .section h2 {
      font-size: 18px;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info {
      font-size: 14px;
      line-height: 1.8;
    }

    .skills span {
      display: inline-block;
      background: #eeeeee;
      color: #333;
      padding: 5px 12px;
      border-radius: 3px;
      margin: 5px 5px 0 0;
      font-size: 12px;
      border-bottom: 3px solid #4CAF50; /* 保留原本的綠色調作為點綴 */
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <img src="photo.jpg" alt="個人照片" class="profile-img">
    
    <div class="name-box">
      <div class="name">林品禎</div>
    </div>
    <div style="font-size: 14px; letter-spacing: 1px;">亞洲大學學生</div>

    <div class="sidebar-section">
      <h2>Profile</h2>
      <div class="sidebar-info" id="intro">
        我是一位對醫療與復健領域充滿熱情的學生，未來希望成為語言治療師，幫助需要的人恢復溝通能力。
      </div>
      <button onclick="changeIntro()">換一段自我介紹</button>
    </div>

    <div class="sidebar-section">
      <h2>Contact</h2>
      <div class="sidebar-info">
        學號：114018057<br>
        Email: example@email.com<br>
        Location: 台中市, 台灣
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="section">
      <h2>Education</h2>
      <div class="info">
        <strong>亞洲大學（在學中）</strong><br>
        2025 - 2026 (預計)<br>
        主修：相關醫療領域
      </div>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">
        <span>溝通能力</span>
        <span>團隊合作</span>
        <span>基礎醫療知識</span>
        <span>問題解決</span>
      </div>
    </div>

    <div class="section">
      <h2>Experience</h2>
      <div class="info">
        曾參與校內活動與團隊合作專案，培養溝通與組織能力。藉由課堂實作深入了解語言治療與解剖學相關基礎。
      </div>
    </div>
  </div>
</div>

<script>
  function changeIntro() {
    const intro = document.getElementById("intro");
    intro.innerText = "我對復健與語言治療領域有高度興趣，希望未來能透過專業幫助更多人提升生活品質。";
  }
</script>

</body>
</html>
