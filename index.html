<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人履歷 - 品禎</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    /* 仿截圖雙欄式容器 (調整寬度) */
    .container {
      width: 750px; /* 稍微縮窄以符合比例 */
      background: white;
      display: flex;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* 左側欄位 - 淺藍色背景 */
    .sidebar {
      width: 32%; /* 側邊欄比例 */
      background-color: #e0f2f1; /* 淺藍色背景 */
      color: #333; /* 側邊欄主要文字顏色 */
      display: flex;
      flex-direction: column;
    }

    /* 淺藍色頂部區域 (包含照片和姓名) */
    .sidebar-top {
      padding: 30px 20px 20px 20px;
      text-align: center;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none; /* 取消原本的粗邊框 */
      object-fit: cover;
      margin-bottom: 25px;
    }

    /* 姓名和職位區域 (取消白框) */
    .name-area {
      margin-bottom: 10px;
    }

    .name {
      font-size: 26px; /* 放大姓名 */
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
    }

    /* 左側區塊通用樣式 */
    .sidebar-block {
      padding: 20px 20px;
      text-align: left;
    }

    .sidebar-block h2 {
      font-size: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px; /* 圖示與文字間距 */
      margin-bottom: 15px;
      padding-bottom: 5px;
      text-transform: uppercase;
      font-weight: bold;
    }
    
    .sidebar-block h2 i {
      color: #4CAF50; /* 統一使用綠色調圖示，與右側呼應 */
      font-size: 18px;
    }

    .sidebar-info {
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 15px;
    }

    /* 左側技能區塊 (Skills) */
    .sidebar-skills .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sidebar-skills .skills span {
      display: inline-block;
      background: white; /* 技能標籤改為白色背景，與淺藍背景對比 */
      color: #333;
      padding: 5px 10px;
      border-radius: 15px; /* 圓角標籤 */
      font-size: 11px;
      border: 1px solid #ddd;
    }

    /* 按鈕樣式 (配合淺藍色背景) */
    button {
      margin-top: 5px;
      padding: 7px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
    }

    button:hover {
      background: #45a049;
    }

    /* 深藍色聯繫區域 (Contact) */
    .sidebar-contact {
      background-color: #1e3a5f; /* 深藍色背景 */
      color: white; /* 聯繫文字設為白色 */
      padding: 25px 20px;
      margin-top: auto; /* 將聯繫區塊推到底部 */
    }

    .sidebar-contact h2 {
      color: white; /* 聯繫區塊標題文字白色 */
    }
    
    .sidebar-contact h2 i {
      color: white; /* 聯繫區塊圖示白色 */
    }

    .sidebar-contact .sidebar-info {
      color: #ccc; /* 聯繫內容文字設為淺灰白色 */
    }
    
    .sidebar-contact .info-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 12px;
    }
    
    .sidebar-contact .info-item i {
        color: white;
        margin-top: 3px;
        width: 14px;
        text-align: center;
    }

    /* 右側白色內容區 */
    .main-content {
      width: 68%; /* 內容區比例 */
      padding: 40px;
      color: #333;
    }

    .section {
      margin-bottom: 35px;
    }

    .section h2 {
      font-size: 18px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }
    
    .section h2 i {
      color: #333; /* 標題圖示深灰，模仿截圖 */
      font-size: 20px;
    }

    .info {
      font-size: 14px;
      line-height: 1.8;
      color: #555;
    }

    .date {
      color: #888;
      font-size: 13px;
      font-weight: normal;
      float: right; /* 日期靠右 */
    }

  </style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-top">
      <img src="photo.jpg" alt="個人照片" class="profile-img">
      <div class="name-area">
        <div class="name">林品禎</div>
        <div class="subtitle">亞洲大學學生</div>
      </div>
    </div>

    <div class="sidebar-block sidebar-skills">
      <h2><i class="fas fa-magic"></i> Skills</h2>
      <div class="skills">
        <span>溝通能力</span>
        <span>團隊合作</span>
        <span>基礎醫療知識</span>
        <span>問題解決</span>
      </div>
    </div>

    <div class="sidebar-block">
      <h2><i class="fas fa-user"></i> Profile</h2>
      <div class="sidebar-info" id="intro">
        我是一位對醫療與復健領域充滿熱情的學生，未來希望成為語言治療師，幫助需要的人恢復溝通能力。
      </div>
      <button onclick="changeIntro()">換一段自我介紹</button>
    </div>

    <div class="sidebar-contact">
      <h2><i class="fas fa-id-card"></i> Contact</h2>
      <div class="sidebar-info">
          <div class="info-item"><i class="fas fa-user-graduate"></i> 學號：114018057</div>
          <div class="info-item"><i class="fas fa-envelope"></i> example@email.com</div>
          <div class="info-item"><i class="fas fa-map-marker-alt"></i> 台中市, 台灣</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="section">
      <h2><i class="fas fa-graduation-cap"></i> Education</h2>
      <div class="info">
        <strong>亞洲大學（在學中）</strong> <span class="date">2025 - 2026 (預計)</span><br>
        主修：相關醫療領域
      </div>
    </div>

    <div class="section">
      <h2><i class="fas fa-briefcase"></i> Experience</h2>
      <div class="info">
        曾參與校內活動與團隊合作專案，培養溝通與組織能力。藉由課堂實作深入了解語言治療與解剖學相關基礎。
      </div>
    </div>
  </div>
</div>

<script>
  function changeIntro() {
    const intro = document.getElementById("intro");
    intro.innerText = "我對復健與語言治療領域有高度興趣，希望未來能透過專業幫助更多人提升生活品質。";
  }
</script>

</body>
</html>
